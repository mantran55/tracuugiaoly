<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tra Cứu Điểm Danh - Giáo Xứ Biên Hòa</title>

    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        :root {
            --blue-deep: #1e3a8a;
            --blue: #1d4ed8;
            --blue-mid: #2563eb;
            --blue-soft: #3b82f6;
            --blue-pale: #dbeafe;
            --blue-ghost: #eff6ff;
            --red-deep: #991b1b;
            --red: #dc2626;
            --red-bright: #ef4444;
            --red-pale: #fee2e2;
            --red-ghost: #fef2f2;
            --green: #059669;
            --green-pale: #d1fae5;
            --gold: #d97706;
            --gold-pale: #fef3c7;
            --gold-deep: #92400e;
            --bg: #f0f4fa;
            --bg-warm: #f8f9fc;
            --surface: #ffffff;
            --text: #111827;
            --text-secondary: #4b5563;
            --text-muted: #9ca3af;
            --border: #e2e8f0;
            --border-soft: #f1f5f9;
            --shadow-sm: 0 1px 3px rgba(30, 58, 138, 0.04);
            --shadow-md: 0 4px 16px rgba(30, 58, 138, 0.06), 0 1px 3px rgba(30, 58, 138, 0.04);
            --shadow-lg: 0 12px 40px rgba(30, 58, 138, 0.08), 0 4px 12px rgba(30, 58, 138, 0.04);
            --shadow-xl: 0 20px 60px rgba(30, 58, 138, 0.1), 0 8px 20px rgba(30, 58, 138, 0.06);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 22px;
            --radius-xl: 28px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* === NỀN TRANG TRÍ === */
        .bg-decor {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-decor::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(29, 78, 216, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            animation: bgFloat1 18s ease-in-out infinite;
        }

        .bg-decor::after {
            content: '';
            position: absolute;
            bottom: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(220, 38, 38, 0.04) 0%, transparent 70%);
            border-radius: 50%;
            animation: bgFloat2 22s ease-in-out infinite;
        }

        @keyframes bgFloat1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-40px, 30px) scale(1.08); }
        }

        @keyframes bgFloat2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.05); }
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(29, 78, 216, 0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(29, 78, 216, 0.018) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse at 50% 30%, black 20%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at 50% 30%, black 20%, transparent 70%);
        }

        /* === HEADER === */
        .header {
            position: relative;
            z-index: 1;
            background: linear-gradient(160deg, var(--blue-deep) 0%, var(--blue) 40%, var(--blue-mid) 100%);
            color: white;
            text-align: center;
            padding: 36px 20px 110px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(220, 38, 38, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(59, 130, 246, 0.2) 0%, transparent 50%);
            pointer-events: none;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 130px;
            background: linear-gradient(to top, var(--bg), transparent);
            pointer-events: none;
        }

        .header-orb {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.06);
            pointer-events: none;
        }

        .header-orb:nth-child(1) {
            width: 300px; height: 300px;
            top: -80px; right: -60px;
            animation: orbSpin 30s linear infinite;
        }

        .header-orb:nth-child(2) {
            width: 200px; height: 200px;
            bottom: 20px; left: -40px;
            animation: orbSpin 24s linear infinite reverse;
        }

        .header-orb:nth-child(3) {
            width: 150px; height: 150px;
            top: 30px; left: 15%;
            border-color: rgba(220, 38, 38, 0.08);
            animation: orbSpin 20s linear infinite;
        }

        @keyframes orbSpin { to { transform: rotate(360deg); } }

        .header-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* === LOGO TRUNG TÂM === */
        .logo-wrap {
            position: relative;
            width: 96px; height: 96px;
            margin-bottom: 24px;
            flex-shrink: 0;
        }

        .logo-glow {
            position: absolute;
            inset: -40px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59,130,246,0.3) 0%, rgba(220,38,38,0.12) 35%, transparent 65%);
            animation: glowPulse 4s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .logo-ring {
            position: absolute;
            border-radius: 50%;
            z-index: 1;
        }

        .ring-inner {
            inset: -12px;
            background: conic-gradient(from 0deg, var(--blue-soft), rgba(255,255,255,0.15), var(--red-bright), rgba(255,255,255,0.15), var(--blue-soft));
            animation: ringRotate 8s linear infinite;
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2.5px), #000 calc(100% - 2.5px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 2.5px), #000 calc(100% - 2.5px));
        }

        .ring-outer {
            inset: -24px;
            background: conic-gradient(from 180deg, var(--red-bright), transparent 25%, var(--blue-soft), transparent 50%, var(--red-bright));
            animation: ringRotate 14s linear infinite reverse;
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 1.5px), #000 calc(100% - 1.5px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 1.5px), #000 calc(100% - 1.5px));
            opacity: 0.45;
        }

        @keyframes ringRotate { to { transform: rotate(360deg); } }

        .ring-dot {
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            z-index: 2;
            animation: ringRotate 8s linear infinite;
            pointer-events: none;
        }

        .ring-dot::before {
            content: '';
            position: absolute;
            top: -4px; left: 50%;
            transform: translateX(-50%);
            width: 8px; height: 8px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 6px 2px rgba(255,255,255,0.9), 0 0 16px 4px rgba(59,130,246,0.6), 0 0 30px 8px rgba(59,130,246,0.3);
        }

        .ring-dot-outer {
            position: absolute;
            inset: -24px;
            border-radius: 50%;
            z-index: 2;
            animation: ringRotate 14s linear infinite reverse;
            pointer-events: none;
        }

        .ring-dot-outer::before {
            content: '';
            position: absolute;
            bottom: -3px; left: 50%;
            transform: translateX(-50%);
            width: 5px; height: 5px;
            background: var(--red-bright);
            border-radius: 50%;
            box-shadow: 0 0 4px 1px rgba(239,68,68,0.8), 0 0 12px 3px rgba(239,68,68,0.4);
            opacity: 0.7;
        }

        .logo {
            width: 96px; height: 96px;
            object-fit: contain;
            border-radius: 50%;
            position: relative;
            z-index: 3;
            filter: drop-shadow(0 4px 20px rgba(0,0,0,0.25));
            background: rgba(255,255,255,0.08);
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 100px;
            padding: 5px 16px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 22px;
            color: rgba(255,255,255,0.85);
        }

        .header-badge::before {
            content: '';
            width: 5px; height: 5px;
            background: var(--red-bright);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--red-bright);
            animation: dotBlink 2s ease-in-out infinite;
        }

        @keyframes dotBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .header h1 {
            font-size: 34px;
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.15);
        }

        .header-sub {
            font-size: 15px;
            opacity: 0.8;
            font-weight: 400;
            line-height: 1.7;
            letter-spacing: 0.5px;
        }

        .header-sub span {
            display: inline-block;
            padding: 0 6px;
        }

        /* === CONTAINER === */
        .container {
            max-width: 1100px;
            margin: auto;
            padding: 0 20px 50px;
            position: relative;
            z-index: 1;
        }

        /* === SEARCH === */
        .search-card {
            background: var(--surface);
            margin-top: -55px;
            padding: 10px;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            position: relative;
            z-index: 3;
            border: 1px solid rgba(255,255,255,0.8);
            transition: box-shadow 0.4s;
        }

        .search-card:focus-within {
            box-shadow: var(--shadow-xl), 0 0 0 4px rgba(29,78,216,0.08);
        }

        .search-form {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .search-form input {
            flex: 1;
            padding: 16px 20px 16px 48px;
            border: none;
            font-size: 15px;
            font-family: 'Be Vietnam Pro', sans-serif;
            color: var(--text);
            background: transparent;
            outline: none;
            font-weight: 500;
        }

        .search-form input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        .search-input-wrap {
            flex: 1;
            position: relative;
        }

        .search-input-wrap .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 20px;
            pointer-events: none;
            transition: color 0.3s;
        }

        .search-input-wrap:focus-within .search-icon {
            color: var(--blue);
        }

        .search-form button {
            background: linear-gradient(135deg, var(--red) 0%, var(--red-deep) 100%);
            color: white;
            border: none;
            padding: 16px 30px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            font-family: 'Be Vietnam Pro', sans-serif;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(220,38,38,0.25);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-form button .material-icons-round {
            font-size: 18px;
        }

        .search-form button::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
            background-size: 300% 100%;
            animation: btnShine 4s ease-in-out infinite;
        }

        @keyframes btnShine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .search-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(220,38,38,0.35);
        }

        .search-form button:active { transform: translateY(0); }

        /* === TOAST === */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: white;
            border: 1px solid var(--red-pale);
            border-left: 4px solid var(--red);
            color: var(--red-deep);
            padding: 14px 24px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            font-family: 'Be Vietnam Pro', sans-serif;
            z-index: 999;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow-lg);
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* === TRẠNG THÁI === */
        .hidden { display: none !important; }

        .state-box {
            margin-top: 28px;
            text-align: center;
            padding: 60px 20px;
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-soft);
            animation: fadeUp 0.5s ease-out;
        }

        .state-box .state-illustration {
            width: 80px; height: 80px;
            margin: 0 auto 18px;
            background: var(--blue-ghost);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--blue-soft);
            font-size: 36px;
        }

        .state-text {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .loader-dots {
            display: inline-flex;
            gap: 6px;
        }

        .loader-dots span {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--blue);
            animation: dotJump 1.2s ease-in-out infinite;
        }

        .loader-dots span:nth-child(2) { animation-delay: 0.15s; }
        .loader-dots span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes dotJump {
            0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === PROFILE CARD === */
        .profile-card {
            background: var(--surface);
            margin-top: 28px;
            padding: 0;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-soft);
            animation: fadeUp 0.6s ease-out both;
            position: relative;
            overflow: hidden;
        }

        .profile-banner {
            height: 80px;
            background: linear-gradient(135deg, var(--blue-deep) 0%, var(--blue) 50%, var(--blue-mid) 100%);
            position: relative;
            overflow: hidden;
        }

        .profile-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 50%, rgba(220,38,38,0.2) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 30%, rgba(255,255,255,0.08) 0%, transparent 50%);
        }

        .profile-banner-pattern {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
            background-size: 16px 16px;
        }

        .profile-body {
            padding: 0 32px 28px;
            position: relative;
        }

        .profile-top {
            display: flex;
            align-items: flex-end;
            gap: 20px;
            margin-top: -36px;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 72px; height: 72px;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid var(--surface);
            flex-shrink: 0;
            position: relative;
            box-shadow: 0 4px 16px rgba(30,58,138,0.12);
        }

        .profile-avatar img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }

        .profile-avatar::after {
            content: '';
            position: absolute;
            bottom: -2px; right: -2px;
            width: 18px; height: 18px;
            background: var(--green);
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(5,150,105,0.3);
        }

        .profile-info {
            padding-bottom: 4px;
        }

        .profile-name {
            font-size: 25px;
            font-weight: 800;
            color: #c51313;
            text-shadow:
                -1px -1px 0 #fff,
                1px -1px 0 #fff,
                -1px  1px 0 #fff,
                1px  1px 0 #fff;
        }

        .profile-role {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .profile-role .role-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--red);
            flex-shrink: 0;
        }

        .profile-meta {
            display: flex;
            gap: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border-soft);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .meta-item .material-icons-round {
            font-size: 17px;
            color: var(--blue-soft);
        }

        /* === STATS === */
        .stats {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        .stat-box {
            background: var(--surface);
            border-radius: var(--radius-md);
            padding: 24px 16px 20px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-soft);
            position: relative;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeUp 0.6s ease-out both;
        }

        .stat-box:nth-child(1) { animation-delay: 0.1s; }
        .stat-box:nth-child(2) { animation-delay: 0.15s; }
        .stat-box:nth-child(3) { animation-delay: 0.2s; }
        .stat-box:nth-child(4) { animation-delay: 0.25s; }

        .stat-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            border-radius: 3px 3px 0 0;
        }

        .stat-box.blue::before { background: linear-gradient(90deg, var(--blue), var(--blue-soft)); }
        .stat-box.red::before { background: linear-gradient(90deg, var(--red), var(--red-bright)); }
        .stat-box.green::before { background: linear-gradient(90deg, #059669, #34d399); }
        .stat-box.mix::before { background: linear-gradient(90deg, var(--blue), var(--red)); }

        .stat-box::after {
            content: '';
            position: absolute;
            bottom: -20px; right: -20px;
            width: 80px; height: 80px;
            border-radius: 50%;
            opacity: 0.03;
            transition: opacity 0.35s, transform 0.35s;
        }

        .stat-box.blue::after { background: var(--blue-deep); }
        .stat-box.red::after { background: var(--red-deep); }
        .stat-box.green::after { background: var(--green); }
        .stat-box.mix::after { background: var(--blue-deep); }

        .stat-box:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: var(--border);
        }

        .stat-box:hover::after {
            opacity: 0.06;
            transform: scale(1.5);
        }

        .stat-icon {
            width: 40px; height: 40px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            font-size: 20px;
        }

        .stat-box.blue .stat-icon { background: var(--blue-pale); color: var(--blue); }
        .stat-box.red .stat-icon { background: var(--red-pale); color: var(--red); }
        .stat-box.green .stat-icon { background: var(--green-pale); color: var(--green); }
        .stat-box.mix .stat-icon { background: var(--blue-pale); color: var(--blue); }

        .stat-number {
            font-size: 34px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 6px;
        }

        .stat-box.blue .stat-number { color: var(--blue-deep); }
        .stat-box.red .stat-number { color: var(--red-deep); }
        .stat-box.green .stat-number { color: #047857; }
        .stat-box.mix .stat-number { color: var(--blue-deep); }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 700;
        }

        /* === SECTION CHUNG === */
        .section {
            margin-top: 28px;
            animation: fadeUp 0.6s ease-out 0.3s both;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--blue-deep);
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }

        .section-title .material-icons-round {
            font-size: 22px;
            color: var(--blue-soft);
        }

        .section-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        .section-count {
            background: var(--red-pale);
            color: var(--red-deep);
            font-size: 11px;
            font-weight: 800;
            padding: 4px 14px;
            border-radius: 100px;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* === BẢNG ĐIỂM DANH === */
        .table-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-soft);
        }

        .table-container {
            position: relative;
        }

        .table-wrapper {
            overflow: auto;
            max-height: 520px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background: linear-gradient(135deg, var(--blue-deep), var(--blue));
            color: white;
            padding: 15px 18px;
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: sticky;
            top: 0;
            z-index: 2;
        }

        thead th:first-child { text-align: left; }

        tbody td {
            padding: 13px 18px;
            text-align: center;
            border-bottom: 1px solid var(--border-soft);
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        tbody td:first-child { text-align: left; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: var(--blue-ghost); }

        .date-cell {
            font-weight: 600;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }

        .weekday-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.3px;
            margin-left: 6px;
        }

        .weekday-label.sunday { color: var(--red); }
        .weekday-label.weekday { color: var(--blue); }

        .check-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px; height: 30px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 800;
            transition: transform 0.2s;
        }

        .check-badge.yes {
            background: var(--green-pale);
            color: var(--green);
            border: 1px solid rgba(5,150,105,0.15);
        }

        .check-badge.no {
            background: var(--border-soft);
            color: var(--text-muted);
            border: 1px solid var(--border);
            font-size: 10px;
            font-weight: 600;
        }

        tbody tr:hover .check-badge.yes {
            transform: scale(1.12);
        }

        .fade-bottom {
            position: absolute;
            left: 0; right: 0;
            bottom: 0;
            height: 60px;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,1));
            pointer-events: none;
            z-index: 1;
        }

        .load-more {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            padding: 14px;
            cursor: pointer;
            color: var(--blue);
            font-weight: 700;
            font-size: 13px;
            border-top: 1px solid var(--border-soft);
            background: white;
            transition: 0.25s;
            font-family: 'Be Vietnam Pro', sans-serif;
        }

        .load-more:hover { background: var(--blue-ghost); }
        .load-more .material-icons-round { font-size: 18px; transition: 0.25s; }
        .load-more:hover .material-icons-round { transform: translateY(3px); }

        /* === BẢNG KẾT QUẢ HỌC TẬP === */
        .scores-table thead th {
            background: linear-gradient(135deg, var(--red-deep), var(--red));
        }

        .scores-table tbody tr {
            position: relative;
        }

        .scores-table tbody tr:not(:last-child) td {
            border-bottom: 1px solid var(--border-soft);
        }

        .scores-table tbody td {
            padding: 16px 18px;
        }

        .semester-cell {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: var(--text);
        }

        .semester-badge {
            width: 32px; height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .semester-badge.hk1 {
            background: var(--blue-pale);
            color: var(--blue);
        }

        .semester-badge.hk2 {
            background: var(--red-pale);
            color: var(--red);
        }

        .score-value {
            font-size: 20px;
            font-weight: 900;
            color: var(--red);
            letter-spacing: -0.3px;
        }

        .result-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 14px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .result-badge.pass {
            background: var(--green-pale);
            color: #047857;
            border: 1px solid rgba(5,150,105,0.15);
        }

        .result-badge.fail {
            background: var(--red-pale);
            color: var(--red-deep);
            border: 1px solid rgba(220,38,38,0.12);
        }

        .result-badge.none {
            background: var(--border-soft);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .result-badge .material-icons-round {
            font-size: 14px;
        }

        /* === DIVIDER GIỮA 2 SECTION === */
        .section-divider {
            margin-top: 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            animation: fadeUp 0.6s ease-out 0.35s both;
        }

        .section-divider::before,
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }

        .section-divider .divider-diamond {
            width: 8px; height: 8px;
            background: var(--border);
            transform: rotate(45deg);
            border-radius: 2px;
        }

        /* === FOOTER === */
        .footer {
            text-align: center;
            margin-top: 48px;
            padding: 28px 20px;
            position: relative;
        }

        .footer::before {
            content: '';
            display: block;
            width: 50px; height: 2px;
            background: linear-gradient(90deg, var(--blue), var(--red));
            margin: 0 auto 18px;
            border-radius: 2px;
        }

        .footer-text {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .footer-sub {
            font-size: 11px;
            color: var(--border);
            margin-top: 4px;
        }

        /* === SCROLLBAR === */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(29,78,216,0.12); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(29,78,216,0.2); }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .header { padding: 28px 16px 90px; }
            .header h1 { font-size: 24px; }
            .header-sub { font-size: 13px; }
            .header-orb { display: none; }

            .logo-wrap { width: 80px; height: 80px; }
            .logo { width: 80px; height: 80px; }
            .ring-inner { inset: -10px; }
            .ring-outer { inset: -20px; }
            .ring-dot { inset: -10px; }
            .ring-dot-outer { inset: -20px; }
            .logo-glow { inset: -32px; }

            .search-form { flex-wrap: wrap; }
            .search-form input { padding: 14px 16px 14px 44px; }
            .search-form button { width: 100%; padding: 16px; justify-content: center; }

            .stats { grid-template-columns: repeat(2, 1fr); }

            .profile-body { padding: 0 20px 20px; }
            .profile-top { flex-direction: column; align-items: center; text-align: center; }
            .profile-name { font-size: 20px; }
            .profile-role { justify-content: center; }
            .profile-meta { justify-content: center; flex-wrap: wrap; gap: 16px; }

            .stat-number { font-size: 28px; }

            .semester-cell { flex-direction: column; align-items: flex-start; gap: 2px; }
            .scores-table tbody td { padding: 12px 14px; }
            .score-value { font-size: 18px; }
        }

        @media (max-width: 480px) {
            .stats { gap: 10px; }
            .stat-box { padding: 18px 12px 16px; }
            .stat-number { font-size: 24px; }
            .stat-icon { width: 34px; height: 34px; font-size: 17px; margin-bottom: 8px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>

    <div class="bg-decor"></div>
    <div class="bg-grid"></div>

    <div class="toast" id="toast">
        <span class="material-icons-round" style="font-size:18px;">warning</span>
        <span id="toastMsg"></span>
    </div>

    <!-- HEADER -->
    <header class="header">
        <div class="header-orb"></div>
        <div class="header-orb"></div>
        <div class="header-orb"></div>

        <div class="header-content">
            <div class="header-badge">TRA CỨU ĐIỂM DANH</div>

            <div class="logo-wrap">
                <div class="logo-glow"></div>
                <div class="logo-ring ring-inner"></div>
                <div class="logo-ring ring-outer"></div>
                <div class="ring-dot"></div>
                <div class="ring-dot-outer"></div>
                <img src="giaoxu.png" class="logo" alt="Logo Giáo Xứ">
            </div>

            <h1>GIÁO XỨ BIÊN HÒA</h1>

            <div class="header-sub">
                <span>THIẾU NHI THÁNH THỂ VIỆT NAM</span><br>
                <span>Theo dõi kết quả điểm lễ và giáo lý các em</span>
            </div>
        </div>
    </header>

    <!-- NỘI DUNG -->
    <div class="container">

        <div class="search-card">
            <form class="search-form" id="searchForm">
                <div class="search-input-wrap">
                    <span class="material-icons-round search-icon">search</span>
                    <input type="text" id="studentId" placeholder="Nhập mã học viên trên thẻ..." required autocomplete="off">
                </div>
                <button type="submit">
                    <span class="material-icons-round">manage_search</span>
                    TRA CỨU
                </button>
            </form>
        </div>

        <div id="result">
            <div class="state-box">
                <div class="state-illustration">
                    <span class="material-icons-round">badge</span>
                </div>
                <div class="state-text">Nhập mã học viên trên thẻ để tra cứu</div>
            </div>
        </div>

        <footer class="footer">
            <div class="footer-text">GIÁO XỨ BIÊN HÒA</div>
            
        </footer>

    </div>

    <script>

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function animateNumber(el, target) {
            const dur = 700;
            const start = performance.now();
            function tick(now) {
                const p = Math.min((now - start) / dur, 1);
                const ease = 1 - Math.pow(1 - p, 3);
                el.textContent = Math.round(target * ease);
                if (p < 1) requestAnimationFrame(tick);
            }
            requestAnimationFrame(tick);
        }

        /* Xác định kết quả pass/fail cho badge */
        function getResultBadge(result) {
            if (!result) return '<span class="result-badge none">&mdash;</span>';
            const lower = result.toLowerCase().trim();
            const isPass = lower.includes('đạt') || lower.includes('pass') || lower === 'đ';
            const isFail = lower.includes('không') || lower.includes('fail') || lower === 'kđ';
            if (isPass) return '<span class="result-badge pass"><span class="material-icons-round">check_circle</span>' + result + '</span>';
            if (isFail) return '<span class="result-badge fail"><span class="material-icons-round">cancel</span>' + result + '</span>';
            return '<span class="result-badge none">' + result + '</span>';
        }

        const API_URL = 'http://localhost:3000';

        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const studentId = document.getElementById('studentId').value.trim();
            if (!studentId) {
                showToast('Vui lòng nhập mã học viên');
                return;
            }

            const result = document.getElementById('result');

            result.innerHTML = `
                <div class="state-box">
                    <div class="loader-dots">
                        <span></span><span></span><span></span>
                    </div>
                    <div class="state-text" style="margin-top:14px;">Đang tải dữ liệu...</div>
                </div>`;

            try {
                const res = await fetch(`${API_URL}/student/${studentId}`);
                const data = await res.json();

                if (!data.success) {
                    result.innerHTML = `
                        <div class="state-box">
                            <div class="state-illustration" style="background:var(--red-ghost);color:var(--red);">
                                <span class="material-icons-round">person_off</span>
                            </div>
                            <div class="state-text">Không tìm thấy học viên với mã "${studentId}"</div>
                        </div>`;
                    return;
                }

                renderStudent(data);

            } catch (err) {
                result.innerHTML = `
                    <div class="state-box">
                        <div class="state-illustration" style="background:var(--red-ghost);color:var(--red);">
                            <span class="material-icons-round">wifi_off</span>
                        </div>
                        <div class="state-text">Không thể kết nối đến máy chủ. Vui lòng thử lại.</div>
                    </div>`;
            }
        });

        function renderStudent(data) {
            const result = document.getElementById('result');
            const attendance = [...data.attendance].reverse();
            const total = attendance.length;

            const rows = attendance.map((item) => {
                const isSun = item.weekday === 'CN';
                return `
                <tr>
                    <td>
                        <span class="date-cell">${item.date}</span>
                        <span class="weekday-label ${isSun ? 'sunday' : 'weekday'}">(${item.weekday})</span>
                    </td>
                    <td>
                        ${item.mass
                            ? '<span class="check-badge yes">&#10003;</span>'
                            : '<span class="check-badge no">&mdash;</span>'}
                    </td>
                    <td>
                        ${item.catechism
                            ? '<span class="check-badge yes">&#10003;</span>'
                            : '<span class="check-badge no">&mdash;</span>'}
                    </td>
                </tr>`;
            }).join('');

            /* Dữ liệu điểm */
            const scores = data.scores || {};
            const hasScores = scores.ghkiScore || scores.chkiScore || scores.ghkiiScore || scores.chkiiScore;

            result.innerHTML = `

            <!-- PROFILE CARD -->
            <div class="profile-card">
                <div class="profile-banner">
                    <div class="profile-banner-pattern"></div>
                </div>
                <div class="profile-body">
                    <div class="profile-top">
                        <div class="profile-avatar">
                            <img src="ava.png" alt="${data.name}">
                        </div>
                        <div class="profile-info">
                            <div class="profile-name">${data.name}</div>
                            <div class="profile-role">
                                <span class="role-dot"></span>
                                ${data.className}
                            </div>
                        </div>
                    </div>
                    <div class="profile-meta">
                        <div class="meta-item">
                            <span class="material-icons-round">badge</span>
                            Mã: ${data.studentId || data.id || '—'}
                        </div>
                        <div class="meta-item">
                            <span class="material-icons-round">calendar_today</span>
                            ${total} buổi điểm danh
                        </div>
                    </div>
                </div>
            </div>

            <!-- STATS -->
            <div class="stats">
                <div class="stat-box blue">
                    <div class="stat-icon"><span class="material-icons-round">church</span></div>
                    <div class="stat-number" data-target="${data.totalMass}">0</div>
                    <div class="stat-label">Tổng Thánh Lễ</div>
                </div>
                <div class="stat-box green">
                    <div class="stat-icon"><span class="material-icons-round">menu_book</span></div>
                    <div class="stat-number" data-target="${data.catechism}">0</div>
                    <div class="stat-label">Tổng Giáo Lý</div>
                </div>
                <div class="stat-box red">
                    <div class="stat-icon"><span class="material-icons-round">wb_sunny</span></div>
                    <div class="stat-number" data-target="${data.sundayMass}">0</div>
                    <div class="stat-label">Lễ Chúa Nhật</div>
                </div>
                <div class="stat-box mix">
                    <div class="stat-icon"><span class="material-icons-round">event</span></div>
                    <div class="stat-number" data-target="${data.weekdayMass}">0</div>
                    <div class="stat-label">Lễ Ngày Thường</div>
                </div>
            </div>

            <!-- BẢNG ĐIỂM DANH -->
            <section class="section">
                <div class="section-header">
                    <div class="section-title">
                        <span class="material-icons-round">fact_check</span>
                        Lịch Sử Điểm Danh
                    </div>
                    <div class="section-line"></div>
                    <div class="section-count">${total} bản ghi</div>
                </div>
                <div class="table-card">
                    <div class="table-container">
                        <div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th style="text-align:left;">Ngày</th>
                                        <th>Thánh Lễ</th>
                                        <th>Giáo Lý</th>
                                    </tr>
                                </thead>
                                <tbody>${rows}</tbody>
                            </table>
                        </div>
                        <div class="fade-bottom"></div>
                    </div>
                    <div class="load-more" id="loadMoreBtn" onclick="expandTable()">
                        <span>Xem thêm</span>
                        <span class="material-icons-round">expand_more</span>
                    </div>
                </div>
            </section>

            ${hasScores ? `
            <!-- DIVIDER -->
            <div class="section-divider">
                <div class="divider-diamond"></div>
            </div>

            <!-- BẢNG KẾT QUẢ HỌC TẬP -->
            <section class="section">
                <div class="section-header">
                    <div class="section-title">
                        <span class="material-icons-round">school</span>
                        Kết Quả Học Tập Giáo Lý
                    </div>
                    <div class="section-line"></div>
                </div>
                <div class="table-card">
                    <table class="scores-table">
                        <thead>
                            <tr>
                                <th style="text-align:left;">Học Kỳ</th>
                                <th>Điểm</th>
                                <th>Kết Quả</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>
                                    <div class="semester-cell">
                                        <span class="semester-badge hk1">I</span>
                                        <span>Giữa Học Kỳ I</span>
                                    </div>
                                </td>
                                <td><span class="score-value">${scores.ghkiScore || '—'}</span></td>
                                <td>${getResultBadge(scores.ghkiResult)}</td>
                            </tr>
                            <tr>
                                <td>
                                    <div class="semester-cell">
                                        <span class="semester-badge hk1">I</span>
                                        <span>Cuối Học Kỳ I</span>
                                    </div>
                                </td>
                                <td><span class="score-value">${scores.chkiScore || '—'}</span></td>
                                <td>${getResultBadge(scores.chkiResult)}</td>
                            </tr>
                            <tr>
                                <td>
                                    <div class="semester-cell">
                                        <span class="semester-badge hk2">II</span>
                                        <span>Giữa Học Kỳ II</span>
                                    </div>
                                </td>
                                <td><span class="score-value">${scores.ghkiiScore || '—'}</span></td>
                                <td>${getResultBadge(scores.ghkiiResult)}</td>
                            </tr>
                            <tr>
                                <td>
                                    <div class="semester-cell">
                                        <span class="semester-badge hk2">II</span>
                                        <span>Cuối Học Kỳ II</span>
                                    </div>
                                </td>
                                <td><span class="score-value">${scores.chkiiScore || '—'}</span></td>
                                <td>${getResultBadge(scores.chkiiResult)}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
            ` : ''}

            `;

            /* Đếm số */
            setTimeout(() => {
                document.querySelectorAll('.stat-number[data-target]').forEach(el => {
                    animateNumber(el, parseInt(el.dataset.target, 10));
                });
            }, 200);
        }

        /* Xem thêm bảng điểm danh */
        function expandTable() {
            const wrapper = document.querySelector('.table-wrapper');
            const btn = document.getElementById('loadMoreBtn');
            const fade = document.querySelector('.fade-bottom');
            if (wrapper) {
                wrapper.style.maxHeight = 'none';
                if (fade) fade.style.display = 'none';
                if (btn) {
                    btn.innerHTML = '<span>Thu gọn</span><span class="material-icons-round">expand_less</span>';
                    btn.onclick = collapseTable;
                }
            }
        }

        function collapseTable() {
            const wrapper = document.querySelector('.table-wrapper');
            const btn = document.getElementById('loadMoreBtn');
            const fade = document.querySelector('.fade-bottom');
            if (wrapper) {
                wrapper.style.maxHeight = '520px';
                if (fade) fade.style.display = '';
                if (btn) {
                    btn.innerHTML = '<span>Xem thêm</span><span class="material-icons-round">expand_more</span>';
                    btn.onclick = expandTable;
                }
            }
        }

        document.getElementById('studentId').focus();
    </script>

</body>

</html>
